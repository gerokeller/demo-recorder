name: Bug report
description: Something isn't working as documented.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please run `npx tsx runner/doctor.ts` first
        and paste its output below — it usually narrows the cause quickly.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect vs. what actually happened?
      placeholder: |
        I ran `npx demo-recorder scenarios/my-demo.yaml` and expected a video at output/, but the process exited with …
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: Scenario YAML (minimized)
      description: The smallest scenario that reproduces the bug.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Paste the output of `npx tsx runner/doctor.ts` or `npm run doctor`.
      render: text
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: demo-recorder version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v22.11.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14.5 / Ubuntu 22.04"
    validations:
      required: true
